openapi: 3.0.3
info:
  title: Wallet Client Gateway API
  version: 0.0.1
  description: |
    Detta API tillhandahåller serveroperationer som i huvudsak används av klienter till den svenska
    statliga digitala identitetsplånboken.

    This API provides backend operations to be used by the clients of the swedish digital identity wallet.
  contact:
    name: Wallet software development team, Digg Sweden
    email: tbd@tbd.xx
    url: https://to.be.decided.xx
  license:
    name: EUPL-1.2 license
    url: https://to.be.decided.xx
  x-sla:
    availability: Test
    responseTime: 24
    support: Kontorstid
  termsOfService: https://to.be.decided.xx
externalDocs:
  description: TBD. Text som ex. innehåller service level agreement, kända problem eller begränsningar.
  url: https://to.be.decided.xx
servers:
  - url: '/'
security:
  - ApiKeyScheme: []
    SessionIdScheme: []
tags:
  - name: API-info
    description: Information about the API
  - name: Account
    description: Account operations
  - name: Authentication
    description: Authentication operations
  - name: Wallet Unit Attestation
    description: Wallet Unit Attestation operations
  - name: HSM
    description: Hardware Security Module operations

paths:
  /api-info:
    get:
      tags:
        - API-info
      summary: Get info about the API
      description: Get name, version, release date, links and status.
      operationId: getApiInfo
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfoResponse'

  /accounts:
    post:
      tags:
        - Account
      summary: Create account
      deprecated: true
      description: Creates a new account
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequestDto'
        required: true
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'
  /v0/accounts:
    post:
      tags:
        - Account
      summary: Create account
      description: Creates a new account
      operationId: createAccounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
        required: true
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'
  /v0/accounts/wallet-keys:
    post:
      tags:
        - Account
      summary: Add a wallet key to an account
      description: |
        This operation adds a public wallet key (typically owned by the HSM) to the associated account.
        Currently, only one wallet key per account is supported. Any existing key will be replaced.
      operationId: addAccountWalletKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRequest'
        required: true
      responses:
        '201':
          description: Public wallet key added to account
        'default':
          $ref: '#/components/responses/default'

  /v0/accounts/security-envelopes:
    get:
      tags:
        - Account
      summary: Get security envelopes
      description: Returns the security envelopes associated with the authenticated account.
      operationId: getAccountSecurityEnvelopes
      responses:
        '200':
          description: Security envelopes retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEnvelopesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

    post:
      tags:
        - Account
      summary: Add a security envelope to an account
      description: |
        This operation will add a security envelope (typically used with the HSM) to the associated account.
        An account can only have one security envelope for each type. Any existing envelope with the reqeusted
        type will be replaced.
      operationId: addAccountSecurityEnvelope
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityEnvelopeRequest'
        required: true
      responses:
        '201':
          description: The account security envelope being added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEnvelopeResponse'
        'default':
          $ref: '#/components/responses/default'

  /public/auth/session/challenge:
    get:
      tags:
        - Authentication
      summary: Request challenge
      description: Request new login challenge
      operationId: initChallenge
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
        - name: keyId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /public/auth/session/response:
    post:
      tags:
        - Authentication
      summary: Request new Session
      description: Creates a new Session from a given Challenge
      operationId: validateChallenge
      requestBody:
        description: Challenge response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAuthChallengeRequestDto'
            example:
              signedJwt: insert.signed.jwt
        required: true
      responses:
        '200':
          description: Session created
          headers:
            session:
              description: Session ID
              deprecated: true
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAuthChallengeResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /wua:
    post:
      tags:
        - Wallet Unit Attestation
      summary: Request a Wallet Unit Attestation
      description: Creates a Wallet Unit Attestation
      operationId: createWua
      parameters:
        - name: nonce
          in: query
          required: false
          schema:
            type: string
      responses:
        '201':
          description: The Wallet Unit Attestation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WuaDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /hsm/v0/requests:
    post:
      tags:
        - HSM
      summary: Submit an HSM operation request
      description: "Submit an HSM key operation request arranged by the client. This process may be completed quickly and returned \nin the response with status 200 OK. On heavy load, when process takes longer than 3 seconds, the response\nwill be 202 Accepted. In this case the process is running in the background. The result must be fetched by\npolling the getResult endpoint using the corresponding request id until completed.\n"
      operationId: createRequest
      parameters:
        - name: type
          in: query
          description: Optional. Apply the intended HSM operation type. Only used for traceability.
          required: false
          schema:
            $ref: '#/components/schemas/HsmRequestType'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequest'
        required: true
      responses:
        '200':
          description: Request completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '202':
          description: Request is pending, poll for result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        'default':
          $ref: '#/components/responses/default'

  /hsm/v0/requests/{id}:
    get:
      tags:
        - HSM
      summary: Get the HSM operation result
      description: |
        Get the processed HSM key operation result. Use this operation to poll a pending request until completed.
      operationId: getResult
      parameters:
        - name: id
          in: path
          required: true
          description: The HSM request id.
          schema:
            type: string
      responses:
        '200':
          description: Request completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '202':
          description: Request still pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        'default':
          $ref: '#/components/responses/default'

  /hsm/v0/device-states:
    post:
      tags:
        - HSM
      summary: Save the device state
      description: Save the latest state using the device key.
      operationId: saveState
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStateRequest'
        required: true
      responses:
        '200':
          description: The registered state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterStateResponse'
        'default':
          $ref: '#/components/responses/default'

components:
  responses:
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found
    default:
      description: Request failure
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemResponse'

  schemas:
    ApiInfoResponse:
      type: object
      properties:
        name:
          type: string
          example: Wallet Client Gateway API
        version:
          type: string
          example: 0.0.1
        releaseDate:
          type: string
          format: date
          example: '2026-03-18'
        status:
          description: 'API lifecycle status keyword, such as alpha, beta, active, deprecated, retired or decommissioned.'
          type: string
          example: 'active'
        links:
          type: array
          minItems: 0
          items:
            type: string
            example: 'https://docs.serverhost.xx/subfolder/infopage.html'
      required:
        - name
        - version
        - releaseDate
        - status

    ProblemResponse:
      type: object
      description: Problem detail object based on RFC 9457, returned on request failure with any operation.
      properties:
        type:
          type: string
          description: |
            A URI that identifies the problem type. When this member is null, blank or not present,
            its value is assumed to be "about:blank". It indicates that the problem has no additional
            semantics beyond that of the HTTP status code.
          example: /problem-details/device-key-duplicate
        status:
          type: integer
          description: Reflects the http response status code with 3 digits returned by the server.
          minLength: 3
          maxLength: 3
          example: 400
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: Field validation failure
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Request body field value(s) does not validate.
        instance:
          type: string
          description: |
            A URI reference that identifies the specific occurrence of the problem.
            Typically the relative path of the request.
          example: /v0/accounts
        transaction-id:
          type: string
          description: A unique request identifier to be used for debug or troubleshooting.
        invalid-parameters:
          type: array
          description: |
            A list of invalid request (header, query or body) parameters. Depending on the problem type,
            this property might be null, empty or not present.
          items:
            $ref: "#/components/schemas/ProblemParameterResponse"
      required:
        - status
        - title

    ProblemParameterResponse:
      type: object
      description: Detailed information about an invalid request parameter.
      properties:
        reason:
          type: string
          description: A human readable explanation specific to the parameter.
          example: must not be null
        value:
          type: string
          description: The requested parameter value.
        property:
          type: string
          description: Name of the property.
          example: deviceKey

    WuaDto:
      type: object
      properties:
        jwt:
          type: string
          description: Wallet unit attestation
          example: ey5359ddf330...
      required:
        - jwt

    ValidateAuthChallengeRequestDto:
      type: object
      properties:
        signedJwt:
          type: string
          minLength: 1
      required:
        - signedJwt

    ValidateAuthChallengeResponseDto:
      type: object
      properties:
        sessionId:
          type: string
          description: Session ID
          example: 3f2e7c0b-91d2-4a7e-9f34-0d8d9a5a9e77
      required:
        - sessionId

    CreateAccountRequestDto:
      type: object
      properties:
        personalIdentityNumber:
          type: string
          example: '191010101010'
        emailAdress:
          type: string
          example: first.last@example.xx
          minLength: 1
        telephoneNumber:
          type: string
          example: '0701234567'
        publicKey:
          $ref: '#/components/schemas/KeyRequest'
      required:
        - publicKey

    CreateAccountRequest:
      type: object
      properties:
        personalIdentityNumber:
          type: string
          example: '191010101010'
        emailAdress:
          type: string
          example: first.last@example.xx
          minLength: 1
        telephoneNumber:
          type: string
          example: '0701234567'
        deviceKey:
          $ref: '#/components/schemas/KeyRequest'
      required:
        - deviceKey

    KeyRequest:
      type: object
      properties:
        kty:
          type: string
          minLength: 1
          example: EC
        kid:
          type: string
          example: myKey
        alg:
          type: string
        use:
          type: string
        crv:
          type: string
          minLength: 1
          example: P-256
        x:
          type: string
          minLength: 1
          example: 1fH0eqXgMMwCIafNaDc1axdCjLlw7zpTLvLWjpPvhEc
        y:
          type: string
          minLength: 1
          example: 5qOejJs7BK-jLingaUTEhBrzP_YPyHfptS5yWE98I40
      required:
        - crv
        - kid
        - kty
        - x
        - y

    KeyResponse:
      allOf:
        - $ref: '#/components/schemas/KeyRequest'

    SecurityEnvelopeRequest:
      properties:
        type:
          $ref: '#/components/schemas/SecurityEnvelopeType'
        content:
          type: string
          description: The security envelope content. Typically encrypted opaque materials.
          minLength: 1
      required:
        - type
        - content

    SecurityEnvelopeResponse:
      type: object
      properties:
        content:
          type: string
          description: The security envelope content. Typically encrypted opaque materials.
          minLength: 1
      required:
        - content

    SecurityEnvelopeType:
      type: string
      description: 'Security envelope type enum constants.'
      enum:
        - SIGN
        - OTHER

    SecurityEnvelopesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SecurityEnvelopeResponse'

    CreateAccountResponseDto:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
          description: Account ID
          example: 3685BCB1-4AA4-4C81-8806-43FBD31A0957
      required:
        - accountId

    HsmRequestType:
      type: string
      description: The HSM Request type.
      enum:
        - CREATE_SESSION
        - CREATE_KEY
        - LIST_KEYS
        - DELETE_KEY
        - REGISTER_PIN
        - CHANGE_PIN
        - SIGN
        - OTHER

    HsmRequest:
      type: object
      properties:
        jwt:
          type: string
          minLength: 1
          description: JWT payload for the HSM operation.
        clientId:
          type: string
          minLength: 1
          description: Client identifier
        stateJws:
          type: string
          description: Optional. Encoded device-state token. When present the BFF skips the Valkey lookup.
      required:
        - jwt
        - clientId

    HsmRequestStatus:
      type: string
      description: HSM Request operation status.
      enum:
        - COMPLETE
        - PENDING
        - ERROR

    HsmResponse:
      type: object
      description: The HSM-operation response.
      properties:
        id:
          type: string
          description: Identification of the asynchronous HSM-operation.
        status:
          $ref: '#/components/schemas/HsmRequestStatus'
        result:
          type: string
          description: The JWT result from the HSM if completed, else empty.
        resultUrl:
          type: string
          description: Gateway URL where the asynchronous operation result can be polled.
        stateJws:
          type: string
          description: Updated device-state token. Present when status=complete. Persist and send as stateJws on the next request.
      required:
        - correlationId
        - status

    RegisterStateRequest:
      type: object
      properties:
        clientId:
          type: string
          description: The unique client identification
        deviceKey:
          allOf:
            - $ref: '#/components/schemas/KeyRequest'
          description: Device public key
        overwrite:
          type: boolean
          description: Whether to overwrite an existing state
        ttl:
          type: string
          description: Optional. Time-to-live for the state. Use ISO 8601 duration format.
          pattern: '^(-?)P(?=\d|T\d)(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)([DW]))?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?)?$'
          example: P30D
      required:
        - clientId
        - deviceKey
        - overwrite

    RegisterStateResponse:
      type: object
      properties:
        status:
          type: string
        clientId:
          type: string
        devAuthorizationCode:
          type: string
        walletKey:
          allOf:
            - $ref: '#/components/schemas/KeyResponse'
          description: The public key generated by the HSM.
        opaqueServerId:
          type: string
        stateJws:
          type: string
          description: JWS-encoded device state. Store alongside clientId and send as stateJws on subsequent requests.
      required:
        - status
        - clientId

    AuthChallengeDto:
      type: object
      properties:
        nonce:
          type: string

  securitySchemes:
    ApiKeyScheme:
      type: apiKey
      name: X-API-KEY
      in: header
    SessionIdScheme:
      type: apiKey
      name: SESSION
      in: header
