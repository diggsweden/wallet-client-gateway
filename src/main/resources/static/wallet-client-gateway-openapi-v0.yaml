openapi: 3.0.3
info:
  title: Wallet Client Gateway API
  version: 0.0.1
  description: |
    Detta API tillhandahåller serveroperationer som i huvudsak används av klienter till den svenska
    statliga digitala identitetsplånboken.

    This API provides backend operations to be used by the clients of the swedish digital identity wallet.
  contact:
    name: Wallet software development team, Digg Sweden
    email: tbd@tbd.xx
    url: https://to.be.decided.xx
  license:
    name: EUPL-1.2 license
    url: https://to.be.decided.xx
  x-sla:
    availability: Test
    responseTime: 24
    support: Kontorstid
  termsOfService: https://to.be.decided.xx
externalDocs:
  description: TBD. Text som ex. innehåller service level agreement, kända problem eller begränsningar.
  url: https://to.be.decided.xx
servers:
  - url: '/'
security:
  - ApiKeyScheme: []
    SessionIdScheme: []
tags:
  - name: API-info
    description: Information about the API
  - name: Account
    description: Account operations
  - name: Authentication
    description: Authentication operations
  - name: Wallet Unit Attestation
    description: Wallet Unit Attestation operations
  - name: HSM
    description: Hardware Security Module operations
  - name: HSM Async
    description: Asynchronous Hardware Security Module operations
  - name: Attestation
    description: Attestation operations (currently not in use)

paths:
  /api-info:
    get:
      tags:
        - API-info
      summary: Get info about the API
      description: Get name, version, release date, links and status.
      operationId: getApiInfo
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfoResponse'

  /accounts:
    post:
      tags:
        - Account
      summary: Create account
      deprecated: true
      description: Creates a new account
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequestDto'
        required: true
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'
  /v0/accounts:
    post:
      tags:
        - Account
      summary: Create account
      description: Creates a new account
      operationId: createAccounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
        required: true
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'
  /v0/accounts/wallet-keys:
    post:
      tags:
        - Account
      summary: Add a wallet key to an account
      description: |
        This operation adds a public wallet key (typically owned by the HSM) to the associated account.
        Currently, only one wallet key per account is supported. Any existing key will be replaced.
      operationId: addAccountWalletKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRequest'
        required: true
      responses:
        '201':
          description: Public wallet key added to account
        'default':
          $ref: '#/components/responses/default'

  /v0/accounts/security-envelopes:
    post:
      tags:
        - Account
      summary: Add a security envelope to an account
      description: |
        This operation will add a security envelope (typically used with the HSM) to the associated account.
        An account can only have one security envelope for each type. Any existing envelope with the reqeusted
        type will be replaced.
      operationId: addAccountSecurityEnvelope
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityEnvelopeRequest'
        required: true
      responses:
        '201':
          description: The account security envelope being added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEnvelopeResponse'
        'default':
          $ref: '#/components/responses/default'

  /public/auth/session/challenge:
    get:
      tags:
        - Authentication
      summary: Request challenge
      description: Request new login challenge
      operationId: initChallenge
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
        - name: keyId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /public/auth/session/response:
    post:
      tags:
        - Authentication
      summary: Request new Session
      description: Creates a new Session from a given Challenge
      operationId: validateChallenge
      requestBody:
        description: Challenge response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAuthChallengeRequestDto'
            example:
              signedJwt: insert.signed.jwt
        required: true
      responses:
        '200':
          description: Session created
          headers:
            session:
              description: Session ID
              deprecated: true
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAuthChallengeResponseDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /wua:
    post:
      tags:
        - Wallet Unit Attestation
      summary: Request a Wallet Unit Attestation
      description: Creates a Wallet Unit Attestation
      operationId: createWua
      parameters:
        - name: nonce
          in: query
          required: false
          schema:
            type: string
      responses:
        '201':
          description: The Wallet Unit Attestation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WuaDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        'default':
          $ref: '#/components/responses/default'

  /v0/device/state:
    post:
      tags:
        - HSM
      summary: Register device state
      description: Registers the device public key state with the HSM
      operationId: registerState
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStateRequestDto'
        required: true
      responses:
        '201':
          description: State registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterStateResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/hsm/requests/{correlationId}:
    get:
      tags:
        - HSM Async
      summary: Get asynchronous HSM operation result
      description: Gets the result status for a previously submitted asynchronous HSM operation.
      operationId: getHsmRequest
      parameters:
        - name: correlationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation still pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/device/pin:
    post:
      tags:
        - HSM
      summary: Register PIN
      description: |
        Registers a PIN with the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: registerPin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '201':
          description: PIN registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

    put:
      tags:
        - HSM
      summary: Change PIN
      description: |
        Changes the PIN on the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: changePin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: PIN change accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/secure-session:
    post:
      tags:
        - HSM
      summary: Create secure session
      description: |
        Creates a secure session with the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: createHsmSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys:
    post:
      tags:
        - HSM
      summary: Create key
      description: |
        Creates a new key in the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: createKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/delete:
    post:
      tags:
        - HSM
      summary: Delete key
      description: |
        Deletes a key from the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: deleteKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '204':
          description: Key deletion accepted
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/list:
    post:
      tags:
        - HSM
      summary: List keys
      description: |
        Lists keys in the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: listKeys
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Keys listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/sign:
    post:
      tags:
        - HSM
      summary: Sign
      description: |
        Signs data using a key in the HSM. The endpoint path expresses client intent; the
        HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: sign
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Signature produced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/device/pin/requests:
    post:
      tags:
        - HSM Async
      summary: Register PIN asynchronously
      description: |
        Submits a PIN registration operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: registerPinAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

    put:
      tags:
        - HSM Async
      summary: Change PIN asynchronously
      description: |
        Submits a PIN change operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: changePinAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/secure-session/requests:
    post:
      tags:
        - HSM Async
      summary: Create secure session asynchronously
      description: |
        Submits a secure-session operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: createHsmSessionAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/requests:
    post:
      tags:
        - HSM Async
      summary: Create key asynchronously
      description: |
        Submits a key creation operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: createKeyAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/delete/requests:
    post:
      tags:
        - HSM Async
      summary: Delete key asynchronously
      description: |
        Submits a key deletion operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: deleteKeyAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/list/requests:
    post:
      tags:
        - HSM Async
      summary: List keys asynchronously
      description: |
        Submits a key listing operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: listKeysAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

  /v0/keys/sign/requests:
    post:
      tags:
        - HSM Async
      summary: Sign asynchronously
      description: |
        Submits a signing operation for asynchronous execution. The endpoint path expresses
        client intent; the HSM worker dispatches the actual operation encoded inside the JWT payload.
      operationId: signAsync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequestDto'
        required: true
      responses:
        '200':
          description: Operation completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '202':
          description: Operation accepted, poll for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncHsmResponseDto'
        '403':
          $ref: '#/components/responses/Forbidden'
        'default':
          $ref: '#/components/responses/default'

components:
  responses:
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found
    default:
      description: Request failure
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestDto'

  schemas:
    ApiInfoResponse:
      type: object
      properties:
        name:
          type: string
          example: Wallet Client Gateway API
        version:
          type: string
          example: 0.0.1
        releaseDate:
          type: string
          format: date
          example: '2026-03-18'
        status:
          description: 'API lifecycle status keyword, such as alpha, beta, active, deprecated, retired or decommissioned.'
          type: string
          example: 'active'
        links:
          type: array
          items:
            type: string
            example: 'https://docs.serverhost.xx/subfolder/infopage.html'

    BadRequestDto:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
          format: int32
          example: 400
        detail:
          type: string
        instance:
          type: string

    WuaDto:
      type: object
      properties:
        jwt:
          type: string
          description: Wallet unit attestation
          example: ey5359ddf330...
      required:
        - jwt

    ValidateAuthChallengeRequestDto:
      type: object
      properties:
        signedJwt:
          type: string
          minLength: 1
      required:
        - signedJwt

    ValidateAuthChallengeResponseDto:
      type: object
      properties:
        sessionId:
          type: string
          description: Session ID
          example: 3f2e7c0b-91d2-4a7e-9f34-0d8d9a5a9e77
      required:
        - sessionId

    CreateAccountRequestDto:
      type: object
      properties:
        personalIdentityNumber:
          type: string
          example: '191010101010'
        emailAdress:
          type: string
          example: first.last@example.xx
          minLength: 1
        telephoneNumber:
          type: string
          example: '0701234567'
        publicKey:
          $ref: '#/components/schemas/KeyRequest'
      required:
        - emailAdress
        - publicKey

    CreateAccountRequest:
      type: object
      properties:
        personalIdentityNumber:
          type: string
          example: '191010101010'
        emailAdress:
          type: string
          example: first.last@example.xx
          minLength: 1
        telephoneNumber:
          type: string
          example: '0701234567'
        deviceKey:
          $ref: '#/components/schemas/KeyRequest'
      required:
        - emailAdress
        - deviceKey

    KeyRequest:
      type: object
      properties:
        kty:
          type: string
          minLength: 1
          example: EC
        kid:
          type: string
          example: myKey
        alg:
          type: string
        use:
          type: string
        crv:
          type: string
          minLength: 1
          example: P-256
        x:
          type: string
          minLength: 1
          example: 1fH0eqXgMMwCIafNaDc1axdCjLlw7zpTLvLWjpPvhEc
        y:
          type: string
          minLength: 1
          example: 5qOejJs7BK-jLingaUTEhBrzP_YPyHfptS5yWE98I40
      required:
        - crv
        - kid
        - kty
        - x
        - y

    SecurityEnvelopeRequest:
      properties:
        type:
          $ref: '#/components/schemas/SecurityEnvelopeType'
        content:
          type: string
          description: The security envelope content. Typically encrypted opaque materials.
          minLength: 1
      required:
        - type
        - content

    SecurityEnvelopeResponse:
      allOf:
        - $ref: '#/components/schemas/SecurityEnvelopeRequest'

    SecurityEnvelopeType:
      type: string
      description: 'Security envelope type enum constants.'
      enum:
        - SIGN
        - OTHER

    CreateAccountResponseDto:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
          description: Account ID
          example: 3685BCB1-4AA4-4C81-8806-43FBD31A0957
      required:
        - accountId

    HsmRequestDto:
      type: object
      properties:
        jwt:
          type: string
          minLength: 1
          description: JWT payload for the HSM operation
        clientId:
          type: string
          description: Client identifier
      required:
        - jwt
        - clientId

    HsmResponseDto:
      type: object
      properties:
        jwt:
          type: string
          description: JWT response from the HSM
      required:
        - jwt

    AsyncHsmResponseDto:
      type: object
      properties:
        correlationId:
          type: string
          description: Correlation ID for the asynchronous operation
        status:
          type: string
          description: Operation status
        result:
          type: string
          description: JWT result from the HSM when the operation is complete
        resultUrl:
          type: string
          description: URL where the asynchronous operation result can be polled
        error:
          $ref: '#/components/schemas/AsyncHsmErrorDto'
      required:
        - correlationId
        - status

    AsyncHsmErrorDto:
      type: object
      properties:
        message:
          type: string
        httpStatus:
          type: integer
          format: int32
      required:
        - message
        - httpStatus

    RegisterStateRequestDto:
      type: object
      properties:
        publicKey:
          $ref: '#/components/schemas/EcPublicJwkDto'
        overwrite:
          type: boolean
          description: Whether to overwrite an existing state
        ttl:
          type: string
          description: Time-to-live for the state (e.g. 30d)
          example: 30d
      required:
        - publicKey
        - overwrite

    RegisterStateResponseDto:
      type: object
      properties:
        status:
          type: string
        clientId:
          type: string
        devAuthorizationCode:
          type: string
      required:
        - status
        - clientId

    EcPublicJwkDto:
      type: object
      properties:
        kty:
          type: string
          minLength: 1
          example: EC
        crv:
          type: string
          minLength: 1
          example: P-256
        x:
          type: string
          minLength: 1
        y:
          type: string
          minLength: 1
        kid:
          type: string
      required:
        - kty
        - crv
        - x
        - y

    AuthChallengeDto:
      type: object
      properties:
        nonce:
          type: string

  securitySchemes:
    ApiKeyScheme:
      type: apiKey
      name: X-API-KEY
      in: header
    SessionIdScheme:
      type: apiKey
      name: SESSION
      in: header
