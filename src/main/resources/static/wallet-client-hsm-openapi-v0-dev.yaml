openapi: 3.0.3
info:
  title: Wallet HSM API
  version: 0.0.1
  description: |
    Detta API tillhandahåller serveroperationer för nyckelhantering till den
    svenska statliga digitala identitetsplånboken.

    This API provides backend operations for secrets to be used by client devices of the
    swedish digital identity wallet.
  contact:
    name: Wallet software development team, Digg Sweden
    email: tbd@tbd.xx
    url: https://to.be.decided.xx
  license:
    name: EUPL-1.2 license
    url: https://to.be.decided.xx
  x-sla:
    availability: Test
    responseTime: 24
    support: Kontorstid
  termsOfService: https://to.be.decided.xx
externalDocs:
  description: TBD. Text som ex. innehåller service level agreement, kända problem eller begränsningar.
  url: https://to.be.decided.xx
servers:
  - url: '/'
security:
  - ApiKeyScheme: []
    SessionIdScheme: []
tags:
  - name: HSM API-info
    description: Information about the API
  - name: HSM
    description: HSM operations

paths:
  /hsm/api-info:
    get:
      tags:
        - HSM API-info
      summary: Get info about the API
      description: Get name, version, release date, links and status.
      operationId: getApiInfo
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfoResponse'

  /hsm/v0/requests:
    post:
      tags:
        - HSM
      summary: Create an HSM operation request
      description: |
        Submits an HSM key operation request arranged by the client. This process may be completed quickly and returned 
        in the response with status 200 OK. On heavy load, when process takes longer than 3 seconds, the response
        will be 202 Accepted. In this case the process is running in the background. The result must be fetched by
        polling the getResult endpoint using the corresponding request id until completed.
      operationId: createRequest
      parameters:
        - name: type
          in: query
          description: Optional. Apply the intended HSM operation type. Only used for traceability.
          required: false
          schema:
            $ref: '#/components/schemas/HsmRequestType'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HsmRequest'
        required: true
      responses:
        '200':
          description: Request completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '202':
          description: Request is pending, poll for result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        'default':
          $ref: '#/components/responses/default'

  /hsm/v0/requests/{id}:
    get:
      tags:
        - HSM
      summary: Get the HSM operation result
      description: |
        Get the processed HSM key operation result. Use this operation to poll a pending request until completed.
      operationId: getResult
      parameters:
        - name: id
          in: path
          required: true
          description: The HSM request id.
          schema:
            type: string
      responses:
        '200':
          description: Request completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '202':
          description: Request still pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HsmResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        'default':
          $ref: '#/components/responses/default'

  /hsm/v0/device-states:
    post:
      tags:
        - HSM
      summary: Save the device state
      description: Save the latest device state.
      operationId: saveState
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStateRequest'
        required: true
      responses:
        '200':
          description: The registered state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterStateResponse'
        'default':
          $ref: '#/components/responses/default'

components:
  responses:
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found
    default:
      description: Request failure
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemResponse'

  schemas:
    ApiInfoResponse:
      type: object
      properties:
        name:
          type: string
          example: Wallet Client Gateway API
        version:
          type: string
          example: 0.0.1
        releaseDate:
          type: string
          format: date
          example: '2026-03-18'
        status:
          description: 'API lifecycle status keyword, such as alpha, beta, active, deprecated, retired or decommissioned.'
          type: string
          example: 'active'
        links:
          type: array
          items:
            type: string
            example: 'https://docs.serverhost.xx/subfolder/infopage.html'

    ProblemResponse:
      type: object
      description: Problem detail object based on RFC 9457, returned on request failure with any operation.
      properties:
        type:
          type: string
          description: |
            A URI that identifies the problem type. When this member is null, blank or not present,
            its value is assumed to be "about:blank". It indicates that the problem has no additional
            semantics beyond that of the HTTP status code.
          example: /problem-details/device-key-duplicate
        status:
          type: integer
          description: Reflects the http response status code with 3 digits returned by the server.
          minLength: 3
          maxLength: 3
          example: 400
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: Field validation failure
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Request body field value(s) does not validate.
        instance:
          type: string
          description: |
            A URI reference that identifies the specific occurrence of the problem.
            Typically the relative path of the request.
          example: /v0/accounts
        transaction-id:
          type: string
          description: A unique request identifier to be used for debug or troubleshooting.
        invalid-parameters:
          type: array
          description: |
            A list of invalid request (header, query or body) parameters. Depending on the problem type,
            this property might be null, empty or not present.
          items:
            $ref: "#/components/schemas/ProblemParameterResponse"

    ProblemParameterResponse:
      type: object
      description: Detailed information about an invalid request parameter.
      properties:
        reason:
          type: string
          description: A human readable explanation specific to the parameter.
          example: must not be null
        value:
          type: string
          description: The requested parameter value.
        property:
          type: string
          description: Name of the property.
          example: deviceKey

    HsmRequestType:
      type: string
      description: The HSM Request type.
      enum:
        - CREATE_SESSION
        - CREATE_KEY
        - LIST_KEYS
        - DELETE_KEY
        - REGISTER_PIN
        - CHANGE_PIN
        - SIGN
        - OTHER

    HsmRequest:
      type: object
      properties:
        jwt:
          type: string
          minLength: 1
          description: JWT payload for the HSM operation
        clientId:
          type: string
          minLength: 1
          description: Client identifier
      required:
        - jwt
        - clientId
        - type

    HsmRequestStatus:
      type: string
      description: HSM Request operation status.
      enum:
        - COMPLETE
        - PENDING
        - ERROR

    HsmResponse:
      type: object
      description: The HSM-operation response.
      properties:
        id:
          type: string
          description: Identification of the asynchronous HSM-operation.
        status:
          $ref: '#/components/schemas/HsmRequestStatus'
        result:
          type: string
          description: The JWT result from the HSM if completed, else empty.
        resultUrl:
          type: string
          description: Gateway URL where the asynchronous operation result can be polled.
      required:
        - correlationId
        - status

    RegisterStateRequest:
      type: object
      properties:
        clientId:
          type: string
          description: The unique client identification
        publicKey:
          $ref: '#/components/schemas/KeyRequest'
        overwrite:
          type: boolean
          description: Whether to overwrite an existing state
        ttl:
          type: string
          description: Time-to-live for the state (e.g. 30d)
          example: 30d
      required:
        - clientId
        - publicKey
        - overwrite

    RegisterStateResponse:
      type: object
      properties:
        status:
          type: string
        clientId:
          type: string
        devAuthorizationCode:
          type: string
        serverJwsPublicKey:
          $ref: '#/components/schemas/KeyResponse'
        opaqueServerId:
          type: string
      required:
        - status
        - clientId

    KeyRequest:
      type: object
      description: Represents the attributes of a JWK (JSON Web Key) for a cryptographic (public) key.
      properties:
        kid:
          type: string
          minLength: 1
          description: Key id. Used to match a specific key among a set of keys.
          example: '77af5c98b799ad'
        kty:
          type: string
          minLength: 1
          description: |
            Algorithm key type. Identifies the cryptographic algorithm family used with the key,
            such as "RSA" or "EC".
          example: 'EC'
        alg:
          type: string
          description: |
            Algorithm. Identifies the algorithm intended for use with the key,
            such as "RS256" and "ES256".
          example: 'RS256'
        use:
          type: string
          description: |
            Public key use, identifies the intended use of the public key. The "use" parameter is employed to
            indicate whether a public key is used for encrypting data or verifying the signature on data,
            such as "enc" or "sig".
          example: 'enc'
        crv:
          type: string
          minLength: 1
          description: |
            The cryptographic elliptic curve used with the key such as "P-256", "P-384" and "P-521".
          example: 'P-256'
        x:
          type: string
          minLength: 1
          description: |
            The x member contains the x coordinate for the elliptic curve point. It is represented as the base64url
            encoding of the coordinate's big endian representation.
          example: '1fH0eqXgMMwCIafNaDc1axdCjLlw7zpTLvLWjpPvhEc'
        y:
          type: string
          minLength: 1
          description: |
            The y member contains the y coordinate for the elliptic curve point. It is represented as the base64url
            encoding of the coordinate's big endian representation.
          example: '5qOejJs7BK-jLingaUTEhBrzP_YPyHfptS5yWE98I40'
      required:
        - kid
        - kty
        - crv
        - x
        - y

    KeyResponse:
      allOf:
        - $ref: '#/components/schemas/KeyRequest'

  securitySchemes:
    ApiKeyScheme:
      type: apiKey
      name: X-API-KEY
      in: header
    SessionIdScheme:
      type: apiKey
      name: SESSION
      in: header
