spring:
  config:
    import: optional:classpath:application-main.yml

# Application Properties
properties:
  apisecret: my_secret_key
  public-paths:
    - "/actuator/**"
    - "/v3/api-docs/**"
    - "/swagger-ui.html"
    - "/swagger-ui/**"
    - "/public/**"
    - "/wua"
  api-key-protected-paths:
    - "/accounts"
    - "/v0/accounts"
  walletprovider:
    baseurl: http://localhost:${wiremock.provider.port:0}
    wua-path: /wallet-provider/wallet-unit-attestation
  walletaccount:
    baseurl: http://localhost:${wiremock.account.port:0}
    paths:
      post: /account
      get: /account
  wallet-r2ps:
    baseurl: http://localhost:${wiremock.r2ps.port:0}
    paths:
      sync-operation: /hsm/v1/operations
      async-request: /hsm/v1/requests
      async-poll: /hsm/v1/requests/{correlationId}
      new-state: /hsm/v1/device-states
  challenge-cache:
    ttl-seconds: 10

  logging-filter:
    enabled: true
    max-payload-length: 100
    exclude-path:
      exact-match: >
        /
      contains: >
        /actuator, /swagger, /api-docs, .html, .js, .yaml
    sensitive-data-mask:
      mask-value: "***MASKED***"
      # enter values in lower case
      headers: >
        authorization, x-api-key, api-key, apikey, x-auth-token, cookie, set-cookie, x-csrf-token
      body-json-fields: >
        password, secret, token, accessToken, access_token, refreshToken, refresh_token, apiKey, api_key, personalIdentificationNumber, email, phoneNumber
